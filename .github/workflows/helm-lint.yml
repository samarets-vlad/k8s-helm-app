name: Helm Lint

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint all charts
        run: |
          helm lint helm-charts/backend
          helm lint helm-charts/frontend
          helm lint helm-charts/database
          helm lint helm-charts/ingress
          helm lint helm-charts/backup
          helm lint helm-charts/monitoring
